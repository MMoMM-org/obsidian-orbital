name: Release

on:
    push:
        branches: [master]

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write
    attestations: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci

            - run: npm run build

            - run: npm test

            - name: Release
              id: release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npx semantic-release

            - name: Attest build provenance
              if: hashFiles('build/main.js') != ''
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      build/main.js
                      build/manifest.json
                      build/styles.css
